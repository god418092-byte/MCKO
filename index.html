<!DOCTYPE html>
<html>
<head>
    <title>Золотые ручки - Онлайн магазин канцтоваров</title>
    <style>
        /* CSS стили */
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px 0;
        }
        h1 {
            margin: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .product {
            background-color: white;
            border: 1px solid #ccc;
            margin: 10px;
            padding: 10px;
            width: 30%;
            float: left;
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px 0;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
        .cart {
            background-color: #ffcc00;
            color: black;
            padding: 10px;
            position: fixed;
            top: 57px;
            right: 0;
            display: none;
        }
        .contacts {
            background-color: #3399ff;
            color: white;
            padding: 10px;
            position: fixed;
            top: 0;
            right: 60px;
            cursor: pointer;
        }
        .contactMenu {
            display: none;
            position: fixed;
            top: 40px;
            right: 60px;
            background-color: #3399ff;
            color: white;
            padding: 10px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <header>
        <h1>Золотые ручки - Онлайн магазин канцтоваров</h1>
    </header>
    <div class="container">
        <div class="product">
            <img src="pen1.jpg" alt="Золотая ручка 1">
            <h2>Золотая ручка 1</h2>
            <p>Цена: $10</p>
            <button onclick="addToCart('Золотая ручка 1', 10)">Добавить в корзину</button>
        </div>
        <div class="product">
            <img src="pen2.jpg" alt="Золотая ручка 2">
            <h2>Золотая ручка 2</h2>
            <p>Цена: $15</p>
            <button onclick="addToCart('Золотая ручка 2', 15)">Добавить в корзину</button>
        </div>
        <div class="product">
            <img src="pen3.jpg" alt="Золотая ручка 3">
            <h2>Золотая ручка 3</h2>
            <p>Цена: $20</p>
            <button onclick="addToCart('Золотая ручка 3', 20)">Добавить в корзину</button>
        </div>
    </div>

    <button onclick="toggleCart()">Корзина</button>

    <div class="cart" id="cart">
        <h2>Корзина</h2>
        <ul id="cartItems"></ul>
        <p id="totalPrice">Итоговая цена: $0</p>
        <button onclick="pay()">Оплатить</button>
    </div>

    <div class="contacts" onclick="toggleContactMenu()">Контакты</div>

    <div class="contactMenu" id="contactMenu">
        <p>Номер: +7 (930) 964 14-81</p>
        <p>Имя: Цыганова Маргарита Андреевна</p>
    </div>

    <footer>
        <p>&copy; 2021 Золотые ручки</p>
    </footer>

    <script>
        // JavaScript код
        let cart = [];
        let total = 0;
        let cartElement = document.getElementById('cart');
        let contactMenu = document.getElementById('contactMenu');

        function addToCart(item, price) {
            cart.push({name: item, price: price});
            total += price;
            updateCart();
        }

        function updateCart() {
            let cartItems = document.getElementById('cartItems');
            let totalPrice = document.getElementById('totalPrice');
            cartItems.innerHTML = '';
            cart.forEach((item, index) => {
let li = document.createElement('li');
                li.textContent = item.name + ' - Цена: $' + item.price;
                let deleteButton = document.createElement('button');
                deleteButton.textContent = 'Удалить';
                deleteButton.onclick = function() {
                    total -= item.price;
                    cart.splice(index, 1);
                    updateCart();
                };
                li.appendChild(deleteButton);
                cartItems.appendChild(li);
            });
            totalPrice.textContent = 'Итоговая цена: $' + total;
        }

        function pay() {
            alert('Оплата успешно выполнена! Сумма: $' + total);
            cart = [];
            total = 0;
            updateCart();
        }

        function toggleCart() {
            if (cartElement.style.display === 'none') {
                cartElement.style.display = 'block';
            } else {
                cartElement.style.display = 'none';
            }
        }

        function toggleContactMenu() {
            if (contactMenu.style.display === 'none') {
                contactMenu.style.display = 'block';
            } else {
                contactMenu.style.display = 'none';
            }
        }
    </script>
</body>
</html>
